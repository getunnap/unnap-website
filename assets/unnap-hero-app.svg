<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#heroBg)"/>
  <rect width="400" height="400" rx="24" fill="url(#screenGlow)"/>
  <!-- Phone frame -->
  <rect x="120" y="40" width="160" height="280" rx="20" fill="#0d0d12" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <rect x="130" y="55" width="140" height="250" rx="12" fill="#0f1117"/>
  <!-- Notch -->
  <rect x="175" y="50" width="50" height="8" rx="4" fill="#1a1a24"/>
  <!-- App content -->
  <text x="200" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">TODAY</text>
  <text x="200" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#fff">6:20</text>
  <text x="200" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Win Your Morning</text>
  <rect x="140" y="200" width="120" height="44" rx="22" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="200" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Tap to dismiss</text>
  <circle cx="200" cy="290" r="24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <text x="200" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">UNNAP</text>
</svg>
