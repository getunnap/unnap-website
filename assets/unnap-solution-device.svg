<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="deviceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="deviceShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="50%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.2)"/>
    </linearGradient>
  </defs>
  <rect width="320" height="400" rx="24" fill="url(#deviceBg)"/>
  <!-- NFC device shape -->
  <rect x="85" y="80" width="150" height="200" rx="20" fill="#151820" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <rect width="320" height="400" rx="24" fill="url(#deviceShine)"/>
  <rect x="95" y="95" width="130" height="170" rx="14" fill="#0d0e14"/>
  <!-- Tap zone -->
  <circle cx="160" cy="165" r="35" fill="none" stroke="rgba(100,160,255,0.4)" stroke-width="2"/>
  <circle cx="160" cy="165" r="28" fill="rgba(100,160,255,0.08)"/>
  <path d="M160 145v40M145 165h30" stroke="rgba(100,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="160" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">NFC</text>
  <text x="160" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Tap phone here</text>
  <text x="160" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.5)">UNNAP Device</text>
</svg>
